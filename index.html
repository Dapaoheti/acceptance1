<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>JF费用验收</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:"PingFang SC","Microsoft YaHei",sans-serif;
  background:#0f0e0c;
  color:#ece6d8;
  min-height:100vh;
  overflow-x:hidden
}
#wrap{max-width:800px;margin:0 auto}

/* top bar */
.topbar{
  position:sticky;top:0;z-index:50;
  background:rgba(15,14,12,.95);
  border-bottom:1px solid rgba(212,168,67,.15);
  padding:12px 16px;
  display:flex;align-items:center;gap:12px
}
.topbar h1{font-size:1.1rem;font-weight:700;color:#d4a843;flex:1}
.topbar .backbtn{
  background:none;
  border:1px solid rgba(212,168,67,.15);
  color:#a8a090;
  width:38px;height:38px;
  border-radius:8px;
  cursor:pointer;
  font-size:1.1rem
}

/* pages */
.page{display:none;padding:16px}
.page.on{display:block}

/* home */
.homebox{
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  min-height:80vh;gap:30px;text-align:center;padding:20px
}
.homebox .icon{font-size:3rem}
.homebox .title{font-size:1.8rem;font-weight:900;color:#d4a843}
.homebox .sub{font-size:.85rem;color:#a8a090;margin-top:4px}
.homebox .btns{
  display:flex;flex-direction:column;gap:12px;
  width:100%;max-width:320px
}

/* buttons */
.btn{
  font-family:inherit;
  border:none;border-radius:12px;
  cursor:pointer;
  font-size:.95rem;font-weight:600;
  padding:14px 20px;
  display:flex;align-items:center;justify-content:center;gap:8px
}
.btn:active{transform:scale(.97)}
.btn-gold{background:#d4a843;color:#0f0e0c}
.btn-gray{background:#2a2723;color:#ece6d8;border:1px solid rgba(212,168,67,.15)}
.btn-green{background:#4a9e6e;color:#fff}
.btn-sm{padding:10px 14px;font-size:.85rem;border-radius:8px}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none}

/* info box */
.infobox{
  margin-bottom:16px;padding:14px 16px;
  background:#1c1a17;
  border:1px solid rgba(212,168,67,.15);
  border-radius:12px
}
.infobox .projname{font-size:1.05rem;font-weight:700;color:#d4a843}

/* progress */
.progbox{margin-bottom:20px}
.progrow{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.proglbl{font-size:.8rem;color:#a8a090}
.progval{font-size:.8rem;font-weight:600;color:#d4a843}
.progbar{height:5px;background:#2a2723;border-radius:3px;overflow:hidden}
.progfill{height:100%;background:linear-gradient(90deg,#b8922e,#d4a843);border-radius:3px;transition:width .5s}

/* item list */
.itemlist{display:flex;flex-direction:column;gap:8px;padding-bottom:80px}
.itemrow{
  background:#1c1a17;
  border:1px solid rgba(212,168,67,.15);
  border-radius:12px;
  padding:12px 14px;
  display:flex;align-items:center;gap:12px;
  cursor:pointer
}
.itemrow:active{transform:scale(.98);border-color:#d4a843}
.itemnum{
  width:30px;height:30px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:.78rem;font-weight:600;flex-shrink:0
}
.itemnum.st-p{background:#353230;color:#6e6858}
.itemnum.st-a{background:rgba(201,138,62,.12);color:#c98a3e}
.itemnum.st-d{background:rgba(74,158,110,.12);color:#4a9e6e}
.itembody{flex:1;min-width:0}
.itemname{font-size:.9rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.itemmeta{font-size:.72rem;color:#6e6858;margin-top:2px}
.itemtag{
  font-size:.72rem;padding:2px 8px;border-radius:20px;
  flex-shrink:0;white-space:nowrap
}
.itemtag.st-p{background:#353230;color:#6e6858}
.itemtag.st-a{background:rgba(201,138,62,.12);color:#c98a3e}
.itemtag.st-d{background:rgba(74,158,110,.12);color:#4a9e6e}
.itemarr{color:#6e6858;font-size:.9rem;flex-shrink:0}

/* bottom bar */
.bottombar{
  position:fixed;bottom:0;
  left:50%;transform:translateX(-50%);
  width:100%;max-width:800px;
  padding:12px 16px;
  padding-bottom:calc(12px + env(safe-area-inset-bottom,0px));
  background:rgba(15,14,12,.96);
  border-top:1px solid rgba(212,168,67,.15);
  z-index:40
}
.bottombar .btn{width:100%}

/* detail page */
.dtl{
  display:none;position:fixed;inset:0;z-index:80;
  background:#0f0e0c;
  flex-direction:column;overflow-y:auto
}
.dtl.on{display:flex}
.dtl-top{
  padding:12px 16px;
  display:flex;align-items:center;gap:12px;
  border-bottom:1px solid rgba(212,168,67,.15);
  background:rgba(15,14,12,.98);
  position:sticky;top:0;z-index:2
}
.dtl-top button{
  background:none;
  border:1px solid rgba(212,168,67,.15);
  color:#a8a090;
  width:38px;height:38px;
  border-radius:8px;
  cursor:pointer;font-size:1.1rem
}
.dtl-title{
  font-size:1rem;font-weight:700;color:#d4a843;
  flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis
}
.dtl-body{padding:16px;flex:1}
.dtl-foot{
  padding:14px 16px;
  padding-bottom:calc(14px + env(safe-area-inset-bottom,0px));
  border-top:1px solid rgba(212,168,67,.15);
  background:rgba(15,14,12,.98);
  position:sticky;bottom:0
}
.dtl-footbtns{display:flex;gap:10px}
.dtl-footbtns .btn{flex:1}

/* form groups */
.fgroup{margin-bottom:20px}
.fgroup-title{font-size:.85rem;font-weight:600;color:#a8a090;margin-bottom:10px}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fld{
  background:#1c1a17;
  border:1px solid rgba(212,168,67,.15);
  border-radius:8px;padding:12px
}
.fld-lbl{
  font-size:.72rem;color:#6e6858;margin-bottom:4px;
  display:flex;align-items:center;justify-content:space-between
}
.fld-orig{color:#b8922e;font-size:.68rem}
.fld input{
  width:100%;background:transparent;border:none;
  color:#ece6d8;font-size:1rem;font-family:inherit;
  font-weight:600;outline:none;padding:0
}
.fld input::-webkit-outer-spin-button,
.fld input::-webkit-inner-spin-button{-webkit-appearance:none}

/* photo grid */
.pgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.pcard{
  position:relative;aspect-ratio:1;
  border-radius:8px;overflow:hidden;
  border:1px solid rgba(212,168,67,.15);
  cursor:pointer
}
.pcard img{width:100%;height:100%;object-fit:cover}
.pcard .pdel{
  position:absolute;top:4px;right:4px;
  width:24px;height:24px;border-radius:50%;
  background:rgba(192,80,80,.9);color:#fff;
  border:none;font-size:.75rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center
}
.pcard .pinfo{
  position:absolute;bottom:0;left:0;right:0;
  padding:3px 6px;
  background:linear-gradient(transparent,rgba(0,0,0,.8));
  color:#fff;font-size:.6rem
}
.pcard .pnum{
  position:absolute;top:4px;left:4px;
  width:20px;height:20px;border-radius:50%;
  background:#d4a843;color:#000;
  font-size:.65rem;font-weight:700;
  display:flex;align-items:center;justify-content:center
}

/* bottom sheet */
.sht{
  display:none;position:fixed;inset:0;z-index:120;
  background:rgba(0,0,0,.6);
  align-items:flex-end;justify-content:center
}
.sht.on{display:flex}
.sht-body{
  width:100%;max-width:800px;
  background:#1c1a17;
  border-radius:16px 16px 0 0;
  padding:20px 16px;
  padding-bottom:calc(20px + env(safe-area-inset-bottom,10px));
  animation:su .25s
}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sht-body h3{
  font-size:.9rem;color:#a8a090;
  text-align:center;margin-bottom:16px;font-weight:600
}
.sht-opt{
  width:100%;padding:16px;
  border:none;border-radius:12px;
  background:#2a2723;color:#ece6d8;
  font-size:1rem;font-family:inherit;font-weight:600;
  cursor:pointer;margin-bottom:10px;
  display:flex;align-items:center;justify-content:center;gap:10px
}
.sht-opt:active{background:#353230}
.sht-cancel{
  width:100%;padding:16px;
  border:none;border-radius:12px;
  background:transparent;color:#6e6858;
  font-size:1rem;font-family:inherit;font-weight:600;
  cursor:pointer;margin-top:6px
}

/* camera */
.campage{
  display:none;position:fixed;inset:0;z-index:200;
  background:#000;flex-direction:column
}
.campage.on{display:flex}
.cam-vid{
  flex:1;display:flex;align-items:center;justify-content:center;
  overflow:hidden;position:relative;background:#000
}
.cam-vid video{width:100%;height:100%;object-fit:cover}
.cam-flash{
  position:absolute;inset:0;background:#fff;
  opacity:0;pointer-events:none;z-index:10;
  transition:opacity .1s
}
.cam-flash.on{opacity:1}
.cam-top{
  position:absolute;top:0;left:0;right:0;
  padding:12px 16px;
  display:flex;justify-content:space-between;align-items:center;z-index:2
}
.cam-top button{
  width:40px;height:40px;border-radius:50%;
  background:rgba(0,0,0,.5);color:#fff;
  border:none;font-size:1.2rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center
}
.cam-info{
  background:rgba(0,0,0,.6);color:#fff;
  padding:6px 14px;border-radius:20px;font-size:.8rem
}
.cam-bot{
  padding:16px 20px;
  padding-bottom:calc(16px + env(safe-area-inset-bottom,10px));
  display:flex;align-items:center;justify-content:center;
  background:rgba(0,0,0,.8)
}
.cam-snap{
  width:68px;height:68px;border-radius:50%;
  background:#fff;border:4px solid rgba(255,255,255,.4);
  cursor:pointer;flex-shrink:0
}
.cam-snap:active{transform:scale(.9)}

/* viewer */
.vwp{
  display:none;position:fixed;inset:0;z-index:180;
  background:rgba(0,0,0,.95);
  flex-direction:column;align-items:center;justify-content:center
}
.vwp.on{display:flex}
.vwp img{max-width:95vw;max-height:85vh;object-fit:contain;border-radius:8px}
.vwp-x{
  position:absolute;top:16px;right:16px;
  width:40px;height:40px;border-radius:50%;
  background:rgba(255,255,255,.15);color:#fff;
  border:none;font-size:1.3rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;z-index:1
}
.vwp-nav{position:absolute;bottom:30px;display:flex;gap:16px;z-index:1}
.vwp-nav button{
  width:44px;height:44px;border-radius:50%;
  background:rgba(255,255,255,.15);color:#fff;
  border:1px solid rgba(255,255,255,.2);
  font-size:1.2rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center
}
.vwp-ct{
  position:absolute;top:20px;left:50%;
  transform:translateX(-50%);
  color:#fff;font-size:.85rem;z-index:1
}

/* modal */
.mdl{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.7);z-index:100;
  align-items:center;justify-content:center;padding:16px
}
.mdl.on{display:flex}
.mdl-box{
  background:#1c1a17;
  border:1px solid rgba(212,168,67,.15);
  border-radius:16px;
  width:100%;max-width:380px
}
.mdl-hd{
  padding:16px;
  border-bottom:1px solid rgba(212,168,67,.15);
  display:flex;justify-content:space-between;align-items:center
}
.mdl-hd h3{font-size:1rem;font-weight:700;color:#d4a843}
.mdl-hd button{
  background:none;border:none;color:#6e6858;
  font-size:1.5rem;cursor:pointer;padding:4px 8px
}
.mdl-bd{padding:16px;text-align:center}
.mdl-bd p{color:#a8a090;margin-bottom:4px;font-size:.9rem}
.mdl-bd strong{color:#d4a843}
.mdl-acts{display:flex;gap:10px;justify-content:center;margin-top:16px}

/* done page */
.donepage{text-align:center;padding:40px 20px}
.donepage .dicon{font-size:3.5rem;margin-bottom:12px}
.donepage h2{font-size:1.2rem;font-weight:700;color:#4a9e6e;margin-bottom:6px}
.donepage p{color:#a8a090;margin-bottom:24px;font-size:.9rem}
.donepage .dbtns{
  display:flex;flex-direction:column;gap:10px;
  max-width:280px;margin:0 auto
}

/* pdf preview */
.pdfp{
  display:none;position:fixed;inset:0;z-index:150;
  background:rgba(0,0,0,.92);
  flex-direction:column;align-items:center;justify-content:center;
  padding:20px
}
.pdfp.on{display:flex}
.pdfp-body{
  background:#fff;max-width:95vw;max-height:65vh;
  overflow:auto;border-radius:8px;padding:20px
}
.pdfp-btns{margin-top:16px;display:flex;gap:12px}

/* loading */
.ldbox{
  display:none;position:fixed;inset:0;z-index:250;
  background:rgba(0,0,0,.8);
  align-items:center;justify-content:center;
  flex-direction:column;gap:12px
}
.ldbox.on{display:flex}
.ldspin{
  width:36px;height:36px;
  border:3px solid #353230;border-top-color:#d4a843;
  border-radius:50%;animation:spin .8s linear infinite
}
@keyframes spin{to{transform:rotate(360deg)}}
.ldtext{color:#ece6d8;font-size:.9rem}

/* toast */
.tst{
  position:fixed;bottom:80px;
  left:50%;
  transform:translateX(-50%) translateY(20px);
  background:#2a2723;color:#ece6d8;
  padding:10px 20px;border-radius:12px;
  font-size:.85rem;z-index:300;opacity:0;
  transition:all .3s;
  border:1px solid rgba(212,168,67,.15);
  white-space:nowrap;pointer-events:none
}
.tst.on{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div id="wrap">

<div class="topbar">
<button class="backbtn" id="btnBack" onclick="goHome()" style="display:none">&#8592;</button>
<h1 id="topTitle">JF费用验收</h1>
</div>

<div id="pgHome" class="page on">
<div class="homebox">
<div>
<div class="icon">&#128203;</div>
<h2 class="title">JF费用验收</h2>
<p class="sub">按报价单逐项验收 &middot; 避免遗漏</p>
</div>
<div class="btns">
<button class="btn btn-gold" id="btnImport" onclick="pickFile()">&#128229; 导入报价单</button>
<button class="btn btn-gray" id="btnCont" onclick="contProj()" style="display:none"></button>
</div>
</div>
</div>

<div id="pgList" class="page">
<div class="infobox"><div class="projname" id="projName"></div></div>
<div class="progbox">
<div class="progrow">
<span class="proglbl">验收进度</span>
<span class="progval" id="progVal">0/0</span>
</div>
<div class="progbar"><div class="progfill" id="progFill" style="width:0%"></div></div>
</div>
<div class="itemlist" id="itemList"></div>
<div class="bottombar">
<button class="btn btn-gold" id="btnGen" onclick="genPDF()" disabled>&#128196; 生成验收文件</button>
</div>
</div>

<div id="pgDone" class="page">
<div class="donepage">
<div class="dicon">&#9989;</div>
<h2>全部验收完毕</h2>
<p>所有报价事项已完成验收</p>
<div class="dbtns">
<button class="btn btn-green" onclick="genPDF()">&#128196; 生成验收文件</button>
<button class="btn btn-gray" onclick="goHome()">&#127968; 返回首页</button>
</div>
</div>
</div>

</div>

<!-- detail overlay -->
<div class="dtl" id="dtlPage">
<div class="dtl-top">
<button onclick="closeDtl()">&#8592;</button>
<div class="dtl-title" id="dtlTitle"></div>
</div>
<div class="dtl-body">
<div class="fgroup">
<div class="fgroup-title">&#128221; 验收信息（可修改）</div>
<div class="fgrid">
<div class="fld">
<div class="fld-lbl">报价数量 <span class="fld-orig" id="lblOQ"></span></div>
<input type="number" id="inpQ" inputmode="decimal">
</div>
<div class="fld">
<div class="fld-lbl">报价单价(元) <span class="fld-orig" id="lblOP"></span></div>
<input type="number" id="inpP" inputmode="decimal">
</div>
</div>
<div class="fgrid" style="margin-top:10px">
<div class="fld">
<div class="fld-lbl">验收数量 <span class="fld-orig">实际数量</span></div>
<input type="number" id="inpAQ" inputmode="decimal">
</div>
<div class="fld">
<div class="fld-lbl">验收金额(元) <span class="fld-orig">实际金额</span></div>
<input type="number" id="inpAA" inputmode="decimal">
</div>
</div>
<div class="fld" style="margin-top:10px">
<div class="fld-lbl">验收备注</div>
<input type="text" id="inpR" placeholder="输入备注信息">
</div>
</div>
<div class="fgroup">
<div class="fgroup-title" style="display:flex;justify-content:space-between">
<span>&#128247; 验收照片</span>
<span id="phCnt" style="font-weight:400;font-size:.72rem;color:#6e6858">0张</span>
</div>
<div style="margin-bottom:14px">
<button class="btn btn-gold btn-sm" onclick="openSheet()" style="width:100%">&#128247; 选择图片</button>
</div>
<div class="pgrid" id="phGrid"></div>
</div>
</div>
<div class="dtl-foot">
<div class="dtl-footbtns">
<button class="btn btn-gray" onclick="saveOnly()">&#128190; 仅保存</button>
<button class="btn btn-green" onclick="saveAccept()">&#9989; 保存并验收</button>
</div>
</div>
</div>

<!-- pick sheet -->
<div class="sht" id="pickSht">
<div class="sht-body">
<h3>选择图片来源</h3>
<button class="sht-opt" onclick="openCam()">&#128247; 拍照</button>
<button class="sht-opt" onclick="openGal()">&#128444; 从相册选择</button>
<button class="sht-cancel" onclick="closeSheet()">取消</button>
</div>
</div>

<!-- camera -->
<div class="campage" id="camPg">
<div class="cam-vid">
<video id="camVid" autoplay playsinline webkit-playsinline muted></video>
<div class="cam-flash" id="camFlash"></div>
<div class="cam-top">
<button onclick="closeCam()">&#10005;</button>
<div class="cam-info" id="camInfo"></div>
</div>
</div>
<div class="cam-bot">
<button class="cam-snap" onclick="snap()"></button>
</div>
</div>

<!-- viewer -->
<div class="vwp" id="vwpPage">
<button class="vwp-x" onclick="closeVwp()">&#10005;</button>
<div class="vwp-ct" id="vwpCt"></div>
<img id="vwpImg" src="">
<div class="vwp-nav">
<button onclick="vwpNav(-1)">&#9664;</button>
<button onclick="vwpNav(1)">&#9654;</button>
</div>
</div>

<!-- confirm modal -->
<div class="mdl" id="cfmMdl">
<div class="mdl-box">
<div class="mdl-hd">
<h3>确认导入</h3>
<button onclick="cancelImp()">&#215;</button>
</div>
<div class="mdl-bd">
<p>检测到已有验收数据</p>
<p><strong id="cfmName"></strong></p>
<p id="cfmProg"></p>
<div class="mdl-acts">
<button class="btn btn-gold btn-sm" onclick="doImp(true)">覆盖重新验收</button>
<button class="btn btn-gray btn-sm" onclick="cancelImp()">取消</button>
</div>
</div>
</div>
</div>

<!-- pdf preview -->
<div class="pdfp" id="pdfP">
<div class="pdfp-body" id="pdfBody"></div>
<div class="pdfp-btns">
<button class="btn btn-green btn-sm" onclick="dlPdf()">&#128229; 下载PDF</button>
<button class="btn btn-gray btn-sm" onclick="closePdf()">关闭</button>
</div>
</div>

<!-- loading -->
<div class="ldbox" id="ldBox">
<div class="ldspin"></div>
<div class="ldtext" id="ldTxt">正在生成...</div>
</div>

<!-- toast -->
<div class="tst" id="tstBox"></div>

<script>
console.log("=== JF验收系统启动 ===");

var DBNAME="JFV31";
var STORE="ph";
var PKEY="pj";
var proj=null;
var cidx=-1;
var cstrm=null;
var pnd=null;
var pblob=null;
var vi=0;
var vph=[];

function odb(){
  return new Promise(function(ok,no){
    var r=indexedDB.open(DBNAME,1);
    r.onupgradeneeded=function(e){
      var d=e.target.result;
      if(!d.objectStoreNames.contains(STORE)){
        d.createObjectStore(STORE);
      }
    };
    r.onsuccess=function(e){ok(e.target.result)};
    r.onerror=function(e){no(e.target.error)};
  });
}

function dput(k,v){
  return odb().then(function(db){
    return new Promise(function(ok,no){
      var t=db.transaction(STORE,"readwrite");
      t.objectStore(STORE).put(v,k);
      t.oncomplete=ok;
      t.onerror=function(){no(t.error)};
    });
  }).catch(function(){});
}

function dget(k){
  return odb().then(function(db){
    return new Promise(function(ok){
      var t=db.transaction(STORE,"readonly");
      var r=t.objectStore(STORE).get(k);
      r.onsuccess=function(){ok(r.result)};
      r.onerror=function(){ok(null)};
    });
  }).catch(function(){return null});
}

function ddel(k){
  return odb().then(function(db){
    db.transaction(STORE,"readwrite").objectStore(STORE).delete(k);
  }).catch(function(){});
}

function sv(){
  if(!proj)return;
  var d={
    n:proj.n,t:proj.t,
    i:proj.i.map(function(x){
      return{
        s:x.s,n:x.n,oq:x.oq,op:x.op,
        q:x.q,p:x.p,
        aq:x.aq||"",aa:x.aa||"",rm:x.rm||"",
        ph:x.ph.map(function(y){return{d:y.d,l:y.l}}),
        d:x.d
      };
    })
  };
  dput(PKEY,JSON.stringify(d)).catch(function(){});
}

function ld(){
  return dget(PKEY).then(function(s){
    if(!s)return null;
    var d=JSON.parse(s);
    if(!d||!d.i)return null;
    return Promise.all(d.i.map(function(it){
      return Promise.all(it.ph.map(function(p,j){
        return dget("p_"+it.s+"_"+j).then(function(u){if(u)p.u=u});
      })).then(function(){return it});
    })).then(function(){return d});
  }).catch(function(){return null});
}

function clr(){
  ddel(PKEY).catch(function(){});
  if(proj&&proj.i){
    proj.i.forEach(function(it){
      for(var j=0;j<it.ph.length;j++){
        ddel("p_"+it.s+"_"+j);
      }
    });
  }
}

function geo(){
  return new Promise(function(ok){
    if(!navigator.geolocation)return ok("");
    navigator.geolocation.getCurrentPosition(function(p){
      var la=p.coords.latitude;
      var lo=p.coords.longitude;
      ok(
        Math.abs(la).toFixed(4)+"\u00b0"+(la>=0?"N":"S")+
        ", "+
        Math.abs(lo).toFixed(4)+"\u00b0"+(lo>=0?"E":"W")
      );
    },function(){ok("")},{timeout:8000,maximumAge:60000});
  });
}

function wm(cvs,dt,loc){
  var c=cvs.getContext("2d");
  var w=cvs.width;
  var h=cvs.height;
  var ls=[dt];
  if(loc)ls.push(loc);
  var fs=Math.max(14,Math.floor(w/28));
  c.font='600 '+fs+'px "PingFang SC","Microsoft YaHei",sans-serif';
  c.textAlign="right";
  c.textBaseline="bottom";
  var lh=fs*1.5;
  var pd=fs*0.8;
  for(var i=0;i<ls.length;i++){
    var ly=h-pd-(ls.length-1-i)*lh+fs*0.4;
    var lx=w-pd*0.3;
    c.lineWidth=fs/6;
    c.lineJoin="round";
    c.strokeStyle="rgba(0,0,0,.35)";
    c.strokeText(ls[i],lx,ly);
    c.fillStyle="rgba(255,255,255,.55)";
    c.fillText(ls[i],lx,ly);
  }
  var sm=Math.max(9,Math.floor(w/45));
  c.font='600 '+sm+'px "PingFang SC","Microsoft YaHei",sans-serif';
  c.textAlign="right";
  c.textBaseline="top";
  c.lineWidth=sm/6;
  c.strokeStyle="rgba(0,0,0,.3)";
  c.strokeText("\u9a8c\u6536",w-sm*0.5,sm*0.8);
  c.fillStyle="rgba(255,255,255,.5)";
  c.fillText("\u9a8c\u6536",w-sm*0.5,sm*0.8);
}

function rurl(f){
  return new Promise(function(ok,no){
    var r=new FileReader();
    r.onload=function(){ok(r.result)};
    r.onerror=function(){no(r.error)};
    r.readAsDataURL(f);
  });
}

function limg(s){
  return new Promise(function(ok,no){
    var img=new Image();
    img.onload=function(){ok(img)};
    img.onerror=no;
    img.src=s;
  });
}

function tcan(d){
  return limg(d).then(function(img){
    var c=document.createElement("canvas");
    c.width=img.width;
    c.height=img.height;
    c.getContext("2d").drawImage(img,0,0);
    return c;
  });
}

function p2(n){return String(n).padStart(2,"0")}

function esc(s){var d=document.createElement("div");d.textContent=s;return d.innerHTML}

function epdf(s){
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function pickFile(){
  console.log("pickFile called");
  try{
    var inp=document.createElement("input");
    inp.type="file";
    inp.accept=".xlsx,.xls";
    inp.style.position="fixed";
    inp.style.left="-9999px";
    inp.style.top="-9999px";
    inp.style.opacity="0";
    inp.addEventListener("change",function(e){
      console.log("file selected");
      onFile(e);
      try{document.body.removeChild(inp)}catch(x){}
    });
    document.body.appendChild(inp);
    inp.click();
    console.log("input click dispatched");
  }catch(err){
    console.error("pickFile error:",err);
    msg("打开文件选择器失败: "+err.message);
  }

function onFile(e){
  var f=e.target.files[0];
  if(!f){
    console.log("no file selected");
    return;
  }
  console.log("reading file:",f.name,f.size);
  var r=new FileReader();
  r.onload=function(ev){
    console.log("file read complete, size:",ev.target.result.byteLength);
    try{
      var wb=XLSX.read(ev.target.result,{type:"array"});
      console.log("xlsx parsed, sheets:",wb.SheetNames);
      var ws=wb.Sheets[wb.SheetNames[0]];
      var rows=XLSX.utils.sheet_to_json(ws,{header:1});
      console.log("rows:",rows.length);
      if(rows.length<2){
        msg("Excel无数据");
        return;
      }
      var items=[];
      for(var i=1;i<rows.length;i++){
        var rr=rows[i];
        if(!rr||rr[0]===undefined||rr[0]===null)continue;
        items.push({
          s:items.length,
          n:rr[0],
          n2:String(rr[1]||""),
          oq:rr[2]||"",
          op:rr[3]||"",
          q:rr[2]||"",
          p:rr[3]||"",
          aq:"",
          aa:"",
          rm:"",
          ph:[],
          d:false
        });
      }
      console.log("parsed items:",items.length);
      if(!items.length){
        msg("未找到有效数据");
        return;
      }
      pnd={n:f.name.replace(/\.[^.]+$/,""),i:items};
      if(proj&&proj.i&&proj.i.length){
        document.getElementById("cfmName").textContent=proj.n;
        document.getElementById("cfmProg").textContent=
          "\u8fdb\u5ea6: "+
          proj.i.filter(function(x){return x.d}).length+
          "/"+proj.i.length;
        document.getElementById("cfmMdl").classList.add("on");
      }else{
        doImp(false);
      }
    }catch(err){
      console.error("parse error:",err);
      msg("\u89e3\u6790\u5931\u8d25: "+err.message);
    }
  };
  r.onerror=function(err){
    console.error("read error:",err);
    msg("\u8bfb\u53d6\u6587\u4ef6\u5931\u8d25");
  };
  r.readAsArrayBuffer(f);
}

    h+='<td style="border:1px solid #333;padding:6px;background:'+bg+';color:#333;">'+epdf(it.n2)+'</td>';
    h+='<td style="border:1px solid #333;padding:6px;text-align:center;background:'+bg+';color:#333;">'+it.q+'</td>';
    h+='<td style="border:1px solid #333;padding:6px;text-align:center;background:'+bg+';color:#333;">'+it.p+'</td>';
    h+='<td style="border:1px solid #333;padding:6px;text-align:center;background:'+bg+';color:#333;">'+(it.aq||"-")+'</td>';
    h+='<td style="border:1px solid #333;padding:6px;text-align:center;background:'+bg+';color:#333;">'+(it.aa?"\u00a5"+it.aa:"-")+'</td>';
    h+='<td style="border:1px solid #333;padding:6px;background:'+bg+';font-size:11px;color:#666;">'+epdf(it.rm||"-")+'</td>';
    h+='<td style="border:1px solid #333;padding:6px;background:'+bg+';line-height:0;">'+(ph||"-")+'</td>';
    h+='</tr>';
  }

  h+='</tbody></table>';
  h+='<div style="margin-top:20px;display:flex;justify-content:space-between;font-size:12px;color:#888;padding:0 4px;">';
  h+='<div style="display:flex;gap:40px;">';
  h+='<span>\u9a8c\u6536\u4eba\uff1a________________</span>';
  h+='<span>\u590d\u6838\u4eba\uff1a________________</span></div>';
  h+='<span>\u65e5\u671f\uff1a____\u5e74____\u6708____\u65e5</span></div>';
  h+='</div>';

  ct.innerHTML=h;
  document.body.appendChild(ct);

  var imgs=ct.querySelectorAll("img");
  var lps=[];
  for(var i=0;i<imgs.length;i++){
    (function(img){
      if(img.complete&&img.naturalWidth>0)return;
      lps.push(new Promise(function(ok){
        img.onload=ok;
        img.onerror=ok;
        setTimeout(ok,8000);
      }));
    })(imgs[i]);
  }

  Promise.all(lps).then(function(){
    return new Promise(function(ok){setTimeout(ok,800)});
  }).then(function(){
    return html2canvas(ct,{
      scale:2,useCORS:true,logging:false,
      backgroundColor:"#fff",allowTaint:true
    });
  }).then(function(canvas){
    document.body.removeChild(ct);
    var jsP=window.jspdf.jsPDF;
    var id=canvas.toDataURL("image/jpeg",.92);
    var iw=canvas.width;
    var ih=canvas.height;
    var pw=297;
    var ph=210;
    var ratio=pw/(iw/2);
    var th=ih/2*ratio;
    var doc;
    if(th>ph){
      doc=new jsP({orientation:"landscape",unit:"mm",format:"a4"});
      var rem=th;
      var yo=0;
      while(rem>0){
        if(yo>0)doc.addPage();
        var sy=yo/ratio*2;
        var sh=Math.min(ph,rem)/ratio*2;
        var tc=document.createElement("canvas");
        tc.width=iw;
        tc.height=sh;
        tc.getContext("2d").drawImage(canvas,0,sy,iw,sh,0,0,iw,sh);
        doc.addImage(tc.toDataURL("image/jpeg",.92),"JPEG",0,0,pw,sh/2*ratio);
        rem-=ph;
        yo+=ph;
      }
    }else{
      doc=new jsP({orientation:"landscape",unit:"mm",format:"a4"});
      doc.addImage(id,"JPEG",0,0,pw,th);
    }
    pblob=doc.output("blob");
    document.getElementById("pdfBody").innerHTML=h;
    document.getElementById("pdfP").classList.add("on");
    hideLd();
    msg("\u9a8c\u6536\u6587\u4ef6\u5df2\u751f\u6210");
  }).catch(function(e){
    try{document.body.removeChild(ct)}catch(ex){}
    hideLd();
    msg("\u751f\u6210\u5931\u8d25: "+e.message);
    console.error(e);
  });
}

function dlPdf(){
  if(!pblob){
    msg("\u8bf5\u5148\u751f\u6210\u6587\u4ef6");
    return;
  }
  var u=URL.createObjectURL(pblob);
  var a=document.createElement("a");
  a.href=u;
  a.download="\u9a8c\u6536\u5355_"+(proj?proj.n:"\u672a\u77e5")+".pdf";
  a.click();
  URL.revokeObjectURL(u);
  msg("\u5df2\u4e0b\u8f7d");
}

function closePdf(){document.getElementById("pdfP").classList.remove("on")}

function showLd(t){
  document.getElementById("ldTxt").textContent=t||"\u6b63\u5728\u5904\u7406...";
  document.getElementById("ldBox").classList.add("on");
}

function hideLd(){document.getElementById("ldBox").classList.remove("on")}

var tmr=null;
function msg(m){
  var t=document.getElementById("tstBox");
  t.textContent=m;
  t.classList.add("on");
  clearTimeout(tmr);
  tmr=setTimeout(function(){t.classList.remove("on")},2200);
}

chkBtn();
console.log("=== 初始化完成 ===");
</script>
</body>
</html>
